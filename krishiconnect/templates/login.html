{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Krishi Connect</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}" />
    <style>
      :root {
        --primary: #2e7d32;
        --secondary: #81c784;
        --light: #e8f5e8;
        --dark: #1b5e20;
      }
      body {
        font-family: "Poppins", sans-serif;
        background:
          linear-gradient(135deg, var(--light), var(--secondary)),
          url("https://images.unsplash.com/photo-1500651230702-0e2d8a49d4ad?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80");
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-container {
        background-color: rgba(255, 255, 255, 0.95);
        padding: 2.5rem;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 420px;
        backdrop-filter: blur(10px);
      }
      h2 {
        text-align: center;
        color: var(--primary);
        margin-bottom: 2rem;
        font-weight: 600;
      }
      h2 i {
        margin-right: 10px;
      }
      .form-group {
        margin-bottom: 1.5rem;
        position: relative;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #555;
        font-weight: 500;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        box-sizing: border-box;
        font-size: 16px;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }
      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
        outline: none;
      }
      .form-group i {
        position: absolute;
        left: 15px;
        top: 42px;
        color: #aaa;
      }
      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, var(--primary), var(--dark));
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        margin-top: 10px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
      }
      .footer-text {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        color: #666;
      }
      .footer-text a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }
      .footer-text a:hover {
        text-decoration: underline;
      }
      .alert {
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 15px;
        text-align: center;
      }
      .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div style="text-align: right; margin-bottom: 10px">
        <select
          id="language-selector"
          style="padding: 5px; border-radius: 5px; color: #333"
        >
          <option value="en">English</option>
          <option value="hi">हिंदी</option>
          <option value="mr">मराठी</option>
        </select>
      </div>
      <h2><i class="fas fa-leaf"></i> Welcome Back</h2>

      {% for message in messages %}
      <div class="alert alert-danger">{{ message }}</div>
      {% endfor %}

      <form method="POST" action="">
        {% csrf_token %}

        <div class="form-group">
          <label for="email">Email Address</label>
          <i class="fas fa-envelope"></i>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <i class="fas fa-lock"></i>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <div
          class="form-group"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
          "
        >
          <div style="display: flex; align-items: center">
            <input
              type="checkbox"
              id="show-password"
              style="width: auto; margin-right: 10px"
            />
            <label
              for="show-password"
              style="margin-bottom: 0; display: inline"
              data-i18n="show_password"
              >Show Password</label
            >
          </div>
          <a
            href="{% url 'forgot_password' %}"
            style="color: #2e7d32; text-decoration: none; font-size: 14px"
            data-i18n="forgot_password"
            >Forgot Password?</a
          >
        </div>
        <button type="submit" data-i18n="login">Login</button>
      </form>
      <div class="footer-text">
        <p>
          <span data-i18n="dont_have_account">Don't have an account?</span>
          <a href="/signup" data-i18n="signup">Sign Up</a>
        </p>
        <p style="margin-top: 5px">
          <a href="/" data-i18n="back_home">Back to Home</a>
        </p>
      </div>
    </div>

    <script>
      document
        .getElementById("show-password")
        .addEventListener("change", function () {
          var passwordField = document.getElementById("password");
          if (this.checked) {
            passwordField.type = "text";
          } else {
            passwordField.type = "password";
          }
        });
    </script>
    <script src="{% static 'translations.js' %}"></script>
  </body>
</html>
